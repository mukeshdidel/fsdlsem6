<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Internal Style: Changing the title color */
        #page-title { color: darkblue; }
    </style>
</head>
<body class="p-5">

    <h1 id="page-title">InternSetu Registration</h1>
    <p>Please fill out the form below to join the team.</p>

    <nav class="my-3">
        <a href="https://google.com" target="_blank" class="btn btn-sm btn-outline-secondary">Search Info (New Tab)</a>
    </nav>

    <table class="table border">
        <tr class="table-dark">
            <th>Course</th>
            <th>Duration</th>
        </tr>
        <tr>
            <td>Java Spring Boot</td>
            <td>3 Months</td>
        </tr>
    </table>

    <div class="card p-3 shadow-sm">
        <form>
            <label class="form-label">Name:</label>
            <input type="text" class="form-control mb-2" placeholder="Your Name">
            
            <label class="form-label">Select Domain:</label>
            <select class="form-select mb-3">
                <option>Web Development</option>
                <option>Machine Learning</option>
            </select>
            
            <button type="submit" class="btn btn-primary" style="background-color: green; border: none;">Submit (Inline Style)</button>
        </form>
    </div>

</body>
</html>
